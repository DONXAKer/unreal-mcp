name: Python CI

on:
  push:
    branches: [main]
    paths:
      - 'Python/**'
      - '.github/workflows/python.yml'
  pull_request:
    paths:
      - 'Python/**'
      - '.github/workflows/python.yml'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Mypy strict
        run: uv run mypy .

      - name: Pytest (unit only — bridge tests need a live UE Editor)
        run: uv run pytest -m "not bridge" -q
