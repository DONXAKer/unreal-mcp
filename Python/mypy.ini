[mypy]
python_version = 3.12
strict = True
# .clinerules requires `x: T = None` (not Optional[T] = None) on @mcp.tool signatures.
# Mypy's --strict implies --no-implicit-optional which would forbid that idiom, so we
# disable it here. The rest of strict-mode (no untyped defs, no Any returns, etc.) stays on.
no_implicit_optional = False

# Tools live in subpackages without explicit namespace; resolve via Python/ as cwd.
mypy_path = .

# PR1 scope: strict-check the small core (envelope, result_format, project_config,
# recipe_framework, primitives). Their imports cascade into legacy `unreal_mcp_server`
# and all `tools/*_tools.py` modules — keep transitive analysis silent so we only see
# errors in files explicitly passed on the command line. PR3 will widen the scope.
follow_imports = silent

exclude = (?x)(
    ^\.venv/
    | ^tests/fixtures/
  )

# MCP SDK doesn't ship stubs; trust the API surface.
[mypy-mcp.*]
ignore_missing_imports = True

[mypy-fastmcp.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

# Tests use _check helper and untyped fixtures — relax there.
[mypy-tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False
