[mypy]
python_version = 3.12
strict = True
plugins = pydantic.mypy
# .clinerules requires `x: T = None` (not Optional[T] = None) on @mcp.tool signatures.
# Mypy's --strict implies --no-implicit-optional which would forbid that idiom, so we
# disable it here. The rest of strict-mode (no untyped defs, no Any returns, etc.) stays on.
no_implicit_optional = False

# Tools live in subpackages without explicit namespace; resolve via Python/ as cwd.
mypy_path = .

# Full scope: every module under Python/ (except scripts/ and fixtures) is checked
# strictly. follow_imports=normal so transitive analysis catches type errors across
# the bridge — wider scope landed in PR3.
follow_imports = normal

exclude = (?x)(
    ^\.venv/
    | ^tests/fixtures/
    # scripts/ are one-off probes (parity with ruff.toml), not production.
    | ^scripts/
  )

# MCP SDK doesn't ship stubs; trust the API surface.
[mypy-mcp.*]
ignore_missing_imports = True

[mypy-fastmcp.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

# Tests use _check helper, untyped _call fixtures, and rely on dict.get() Any
# returns. Strict mode here is more noise than signal — relax to focus checks
# on production code.
[mypy-tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False
disallow_untyped_calls = False
disallow_any_explicit = False
warn_return_any = False
warn_unused_ignores = False
